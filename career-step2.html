<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CareerMate - Job Suggestions</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Animate.css for animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      color: #f3f6fa;
      min-height: 100vh;
      margin: 0;
    }
    header {
      background: rgba(40, 44, 52, 0.85);
      color: #fff;
      text-align: center;
      padding: 32px 20px 24px 20px;
      font-size: 2em;
      font-weight: bold;
      border-bottom: 1.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      border-radius: 0 0 32px 32px;
      margin-bottom: 32px;
      backdrop-filter: blur(8px);
      animation: headerPop 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    @keyframes headerPop {
      0% { transform: scale(0.8) translateY(-40px); opacity: 0; }
      60% { transform: scale(1.05) translateY(10px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(44, 48, 58, 0.85);
      padding: 28px 18px 18px 18px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      border: 2.5px solid #6366f1;
      color: #e0e7ff;
      animation: animate__fadeInUp 1.2s;
      transition: box-shadow 0.2s, border 0.2s;
      text-align: center;
    }
    .card h3 {
      color: #a5b4fc;
      margin-bottom: 10px;
      font-size: 1.25em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .card p {
      color: #c7d0e0;
      margin-bottom: 12px;
    }
    button {
      margin-top: 10px;
      padding: 12px 32px;
      background: linear-gradient(to right, #6366f1, #a5b4fc);
      border: none;
      border-radius: 20px;
      color: #232526;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.12);
      animation: animate__pulse 2s infinite;
      transition: background 0.3s, color 0.3s;
    }
    button:hover {
      background: linear-gradient(to right, #a5b4fc, #6366f1);
      color: #fff;
    }
  </style>
</head>
<body>
  <header class="animate__animated animate__fadeInDown">
    <i class="bi bi-briefcase-fill text-success animate__animated animate__tada animate__delay-1s"></i>
    <span class="ms-2">Suggested Jobs for You</span>
  </header>
  <div class="container animate__animated animate__fadeInUp" id="jobList"></div>

<script>
const jobs = {
  tech: ["Software Engineer","Data Analyst","AI Specialist"],
  commerce: ["Accountant","Business Analyst","Financial Advisor"],
  science: ["Research Assistant","Lab Scientist","Healthcare Technician"],
  creative: ["Graphic Designer","UI/UX Designer","Content Creator"],
  management: ["HR Manager","Operations Manager","Marketing Manager"]
};
let stream = localStorage.getItem("careerStream") || "tech";
let container = document.getElementById("jobList");
const icons = {
  tech: '<i class="bi bi-cpu text-success"></i>',
  commerce: '<i class="bi bi-bar-chart-line-fill text-warning"></i>',
  science: '<i class="bi bi-flask text-info"></i>',
  creative: '<i class="bi bi-palette-fill text-danger"></i>',
  management: '<i class="bi bi-people-fill text-primary"></i>'
};
jobs[stream].forEach((job, i) => {
  let div = document.createElement("div");
  div.className = "card animate__animated animate__fadeInUp animate__delay-" + (i+1) + "s";
  div.innerHTML = `<h3>${icons[stream] || ''} ${job}</h3><p>A great career option for ${stream} stream.</p>
    <button onclick="chooseJob('${job}')" class="animate__animated animate__pulse animate__infinite">Choose <i class='bi bi-arrow-right-circle-fill'></i></button>`;
  container.appendChild(div);
});
function chooseJob(job){
  localStorage.setItem("chosenJob", job);
  window.location.href="career-step3.html";
}
</script>
</body>
</html>
