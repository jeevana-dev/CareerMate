<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12th Guidance - Step 2</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Animate.css for animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      color: #f3f6fa;
      min-height: 100vh;
      margin: 0;
    }
    .main-container {
      max-width: 420px;
      margin: 60px auto 0 auto;
      padding: 36px 28px 32px 28px;
      background: rgba(44, 48, 58, 0.85);
      border-radius: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      border: 2.5px solid #6366f1;
      backdrop-filter: blur(6px);
      animation: animate__fadeInUp 1.2s;
    }
    h2 {
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      color: #a5b4fc;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
      animation: animate__fadeInDown 1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    label {
      font-size: 1.1em;
      color: #c7d0e0;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input[type="number"], input[type="text"] {
      width: 100%;
      margin: 10px 0 18px 0;
      padding: 10px 12px;
      font-size: 1.08em;
      border-radius: 12px;
      border: 2px solid #6366f1;
      background: rgba(60, 64, 75, 0.85);
      color: #a5b4fc;
      outline: none;
      transition: border 0.3s;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      border: 2px solid #a5b4fc;
    }
    button {
      background: linear-gradient(to right, #6366f1, #a5b4fc);
      color: #232526;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      padding: 12px 32px;
      margin: 28px auto 0 auto;
      display: block;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.12);
      transition: background 0.3s, color 0.3s;
      animation: animate__pulse 2s infinite;
    }
    button:hover {
      background: linear-gradient(to right, #a5b4fc, #6366f1);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="main-container animate__animated animate__fadeInUp">
    <h2><i class="bi bi-person-lines-fill text-primary animate__animated animate__tada animate__delay-1s"></i> Step 2: Enter Your Details</h2>
    <label for="cutoff"><i class="bi bi-123 text-info"></i> Enter Cut-off Marks (%):</label><br>
    <input type="number" id="cutoff" placeholder="Example: 85"><br>
    <label for="region"><i class="bi bi-geo-alt-fill text-warning"></i> Preferred Region:</label><br>
    <input type="text" id="region" placeholder="Example: Chennai"><br>
    <button onclick="saveAndNext()" class="animate__animated animate__pulse animate__infinite">Next <i class="bi bi-arrow-right-circle-fill"></i></button>
  </div>

  <script>
    function saveAndNext() {
      const cutoff = document.getElementById("cutoff").value;
      const region = document.getElementById("region").value;

      if (!cutoff || !region) {
        alert("Please enter both Cut-off and Region!");
        return;
      }

      localStorage.setItem("cutoff", cutoff);
      localStorage.setItem("region", region);
      window.location.href = "grade12-step3.html";
    }
  </script>
</body>
</html>
