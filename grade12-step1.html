<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12th Guidance - Step 1</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Animate.css for animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      color: #f3f6fa;
      min-height: 100vh;
      margin: 0;
    }
    .main-container {
      max-width: 520px;
      margin: 60px auto 0 auto;
      padding: 36px 28px 32px 28px;
      background: rgba(44, 48, 58, 0.85);
      border-radius: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      border: 1.5px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
      animation: animate__fadeInUp 1.2s;
    }
    h2 {
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      color: #a5b4fc;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
      animation: animate__fadeInDown 1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    label {
      font-size: 1.1em;
      color: #c7d0e0;
      font-weight: 500;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      margin: 10px 0 18px 0;
      padding: 10px 12px;
      font-size: 1.08em;
      border-radius: 12px;
      border: 1.5px solid #6366f1;
      background: rgba(60, 64, 75, 0.85);
      color: #a5b4fc;
      outline: none;
      transition: border 0.3s;
    }
    select:focus {
      border: 1.5px solid #a5b4fc;
    }
    video {
      display: block;
      margin: 18px auto 0 auto;
      width: 100%;
      max-width: 400px;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.08);
      background: #181a20;
    }
    button {
      background: linear-gradient(to right, #6366f1, #a5b4fc);
      color: #232526;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      padding: 12px 32px;
      margin: 28px auto 0 auto;
      display: block;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.12);
      transition: background 0.3s, color 0.3s;
      animation: animate__pulse 2s infinite;
    }
    button:hover {
      background: linear-gradient(to right, #a5b4fc, #6366f1);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="main-container animate__animated animate__fadeInUp">
    <h2><i class="bi bi-mortarboard-fill text-warning animate__animated animate__tada animate__delay-1s"></i> Step 1: Choose Your Stream</h2>
    <label for="stream"><i class="bi bi-diagram-3-fill text-info"></i> Select Stream:</label><br>
    <select id="stream">
      <option value="">-- Select --</option>
      <option value="science">Science</option>
      <option value="commerce">Commerce</option>
      <option value="computer">Computer Science</option>
    </select>
    <video id="guidanceVideo" controls>
      <source src="" type="video/mp4">
      Your browser does not support video.
    </video>
    <button onclick="goNext()" class="animate__animated animate__pulse animate__infinite">Next <i class="bi bi-arrow-right-circle-fill"></i></button>
  </div>

  <script>
    const streamSelect = document.getElementById("stream");
    const video = document.getElementById("guidanceVideo");

    streamSelect.addEventListener("change", function () {
      if (this.value === "science") {
        video.src = "videos/science.mp4";
      } else if (this.value === "commerce") {
        video.src = "videos/commerce.mp4";
      } else if (this.value === "computer") {
        video.src = "videos/computer.mp4";
      } else {
        video.src = "";
      }
    });

    function goNext() {
      const stream = document.getElementById("stream").value;
      if (!stream) {
        alert("Please select a stream before continuing.");
        return;
      }
      localStorage.setItem("stream", stream);
      window.location.href = "grade12-step2.html";
    }
  </script>
</body>
</html>
